name: k6-performance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - prod
      load_profile:
        description: "Load profile"
        required: true
        default: "fixed"
        type: choice
        options:
          - fixed
          - ramp-up
          - spike
          - peak
      users:
        description: "Virtual users"
        required: true
        default: "5"
      duration_seconds:
        description: "Duration in seconds"
        required: true
        default: "60"
      base_url:
        description: "Optional BASE_URL override"
        required: false
        default: ""

      # Ramp-up profile parameters
      ramp_up_initial_users:
        description: "[Ramp-up] Initial virtual users"
        required: false
        default: "1"
      ramp_up_target_users:
        description: "[Ramp-up] Target virtual users after ramp"
        required: false
        default: "10"
      ramp_up_base_duration_seconds:
        description: "[Ramp-up] Initial base duration (seconds)"
        required: false
        default: "60"
      ramp_up_ramp_duration_seconds:
        description: "[Ramp-up] Ramp duration (seconds)"
        required: false
        default: "60"
      ramp_up_hold_duration_seconds:
        description: "[Ramp-up] Hold at peak duration (seconds)"
        required: false
        default: "60"

      # Spike profile parameters
      spike_base_users:
        description: "[Spike] Base virtual users"
        required: false
        default: "1"
      spike_peak_users:
        description: "[Spike] Peak virtual users at spike"
        required: false
        default: "10"
      spike_base_before_seconds:
        description: "[Spike] Base duration before spike (seconds)"
        required: false
        default: "60"
      spike_ramp_up_seconds:
        description: "[Spike] Ramp up duration (seconds)"
        required: false
        default: "30"
      spike_ramp_down_seconds:
        description: "[Spike] Ramp down duration (seconds)"
        required: false
        default: "30"
      spike_base_after_seconds:
        description: "[Spike] Base duration after spike (seconds)"
        required: false
        default: "60"

      # Peak profile parameters
      peak_base_users:
        description: "[Peak] Base virtual users"
        required: false
        default: "2"
      peak_peak_users:
        description: "[Peak] Peak virtual users"
        required: false
        default: "10"
      peak_base_before_seconds:
        description: "[Peak] Base duration before ramp (seconds)"
        required: false
        default: "60"
      peak_ramp_up_seconds:
        description: "[Peak] Ramp up duration (seconds)"
        required: false
        default: "60"
      peak_peak_hold_seconds:
        description: "[Peak] Peak hold duration (seconds)"
        required: false
        default: "60"
      peak_ramp_down_seconds:
        description: "[Peak] Ramp down duration (seconds)"
        required: false
        default: "60"
      peak_base_after_seconds:
        description: "[Peak] Base duration after ramp (seconds)"
        required: false
        default: "60"

jobs:
  performance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 simulation
        uses: grafana/run-k6-action@v1
        with:
          path: dist/simulations/todoMvcSimulation.js
          flags: >-
            -e ENV=${{ github.event.inputs.environment || 'dev' }}
            -e LOAD_PROFILE=${{ github.event.inputs.load_profile || 'fixed' }}
            -e USERS=${{ github.event.inputs.users || '5' }}
            -e DURATION_SECONDS=${{ github.event.inputs.duration_seconds || '60' }}
            -e RAMP_UP_INITIAL_USERS=${{ github.event.inputs.ramp_up_initial_users || '1' }}
            -e RAMP_UP_TARGET_USERS=${{ github.event.inputs.ramp_up_target_users || '10' }}
            -e RAMP_UP_BASE_DURATION_SECONDS=${{ github.event.inputs.ramp_up_base_duration_seconds || '60' }}
            -e RAMP_UP_RAMP_DURATION_SECONDS=${{ github.event.inputs.ramp_up_ramp_duration_seconds || '60' }}
            -e RAMP_UP_HOLD_DURATION_SECONDS=${{ github.event.inputs.ramp_up_hold_duration_seconds || '60' }}
            -e SPIKE_BASE_USERS=${{ github.event.inputs.spike_base_users || '1' }}
            -e SPIKE_PEAK_USERS=${{ github.event.inputs.spike_peak_users || '10' }}
            -e SPIKE_BASE_BEFORE_SECONDS=${{ github.event.inputs.spike_base_before_seconds || '60' }}
            -e SPIKE_RAMP_UP_SECONDS=${{ github.event.inputs.spike_ramp_up_seconds || '30' }}
            -e SPIKE_RAMP_DOWN_SECONDS=${{ github.event.inputs.spike_ramp_down_seconds || '30' }}
            -e SPIKE_BASE_AFTER_SECONDS=${{ github.event.inputs.spike_base_after_seconds || '60' }}
            -e PEAK_BASE_USERS=${{ github.event.inputs.peak_base_users || '2' }}
            -e PEAK_PEAK_USERS=${{ github.event.inputs.peak_peak_users || '10' }}
            -e PEAK_BASE_BEFORE_SECONDS=${{ github.event.inputs.peak_base_before_seconds || '60' }}
            -e PEAK_RAMP_UP_SECONDS=${{ github.event.inputs.peak_ramp_up_seconds || '60' }}
            -e PEAK_PEAK_HOLD_SECONDS=${{ github.event.inputs.peak_peak_hold_seconds || '60' }}
            -e PEAK_RAMP_DOWN_SECONDS=${{ github.event.inputs.peak_ramp_down_seconds || '60' }}
            -e PEAK_BASE_AFTER_SECONDS=${{ github.event.inputs.peak_base_after_seconds || '60' }}
            -e BASE_URL=${{ github.event.inputs.base_url || '' }}

      - name: Upload k6 reports
        uses: actions/upload-artifact@v4
        with:
          name: k6-reports
          path: |
            k6-summary.html
            k6-summary.json
            k6-profile-graph.html
