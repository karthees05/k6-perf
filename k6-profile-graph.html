<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>k6 Load Profile Graph</title>
  <style>
    body { font-family: Segoe UI, Tahoma, sans-serif; margin: 24px; background: #f6f8fb; color: #1a202c; }
    .card { background: #fff; border: 1px solid #d9e2ef; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 8px 0; line-height: 1.5; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; font-size: 14px; }
    th { background: #f1f5f9; }
    .axis { stroke: #94a3b8; stroke-width: 1; }
    .line { fill: none; stroke: #0284c7; stroke-width: 3; }
  </style>
</head>
<body>
  <div class="card">
    <h1>k6 Profile Graph: fixed</h1>
    <p>Fixed: 1 virtual users run for 10 seconds, each executing all requests sequentially.</p>
    <p>Total duration: 10s | Start users: 1 | Peak users: 1</p>
  </div>

  <div class="card">
    <svg viewBox="0 0 980 420" width="100%" role="img" aria-label="Load profile graph">
      <line class="axis" x1="70" y1="30" x2="70" y2="370" />
      <line class="axis" x1="70" y1="370" x2="950" y2="370" />
      <path class="line" d="M70.00,30.00 L950.00,30.00" />
      <text x="70" y="22" font-size="12" fill="#475569">Virtual users</text>
      <text x="880" y="408" font-size="12" fill="#475569">Time (seconds)</text>
    </svg>
  </div>

  <div class="card">
    <h2>Stage Breakdown</h2>
    <table>
      <thead>
        <tr><th>Stage</th><th>Duration</th><th>Target users</th></tr>
      </thead>
      <tbody><tr><td>1</td><td>10s</td><td>1</td></tr></tbody>
    </table>
  </div>
</body>
</html>
